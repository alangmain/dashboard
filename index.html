<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Control Panel</title>

<link rel="stylesheet" href="styles.css?v=4">

<script>
/* RADIO TRIGGERS */
const triggers = {
    radio2: "https://www.virtualsmarthome.xyz/url_routine_trigger/activate.php?trigger=f31fd73d-9202-465c-bd71-14e4b5bd87d9&token=6719e404-5060-48ca-8ac0-06048ebd2343&response=html",
    ghr: "https://www.virtualsmarthome.xyz/url_routine_trigger/activate.php?trigger=01c6d8b3-e04a-46f2-88f1-85173964d25a&token=03f00dbf-d70e-4cf9-8cb9-500b900499ec&response=html",
    bfbs: "https://www.virtualsmarthome.xyz/url_routine_trigger/activate.php?trigger=d2e116c1-a6d0-48b5-aa01-5aab22b41f3a&token=a2d676c3-cd9c-42f2-ba86-43a4678c7a4f&response=html",
    absolute: "https://www.virtualsmarthome.xyz/url_routine_trigger/activate.php?trigger=b0b87075-6bed-4923-9551-d8e4f380fd0d&token=d58755e8-9cb9-49c5-b809-ee55b94a0a5f&response=html"
};

function trigger(station) {
    const url = triggers[station] + "&t=" + Date.now();
    fetch(url);
}

/* NOW PLAYING POLL */
function updateNowPlaying() {
    fetch("https://api.allorigins.win/raw?url=http://192.168.0.50/httpapi.asp?command=getPlayerStatus")
        .then(response => response.json())
        .then(data => {
            const title = data.title || "Nothing playing";
            const artist = data.artist || "";
            const art = data.albumArtUrl || "placeholder.jpg";

            document.getElementById("np-title").textContent = title;
            document.getElementById("np-artist").textContent = artist;
            document.getElementById("np-art").src = art;
        })
        .catch(() => {
            document.getElementById("np-title").textContent = "Offline";
            document.getElementById("np-artist").textContent = "";
            document.getElementById("np-art").src = "placeholder.jpg";
        });
}

setInterval(updateNowPlaying, 3000);
window.onload = updateNowPlaying;
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-title">Control Panel</div>

    <div class="weather-header-widget">
        <div class="weather-wrapper">
            <a class="weatherwidget-io"
               href="https://forecast7.com/en/57d48n4d22/inverness/"
               data-label_1="INVERNESS"
               data-label_2="WEATHER"
               data-basecolor="#102A45"
               data-textcolor="#FFFFFF"
               data-highcolor="#FFCC00"
               data-lowcolor="#66A3FF"
               data-suncolor="#FFCC00"
               data-mooncolor="#A0C4FF">
               INVERNESS WEATHER
            </a>
        </div>
    </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

    <!-- NOW PLAYING TILE -->
    <div class="button now-playing">
        <img id="np-art" src="placeholder.jpg">
        <div class="np-overlay">
            <div id="np-title">Loading…</div>
            <div id="np-artist"></div>
        </div>
    </div>

    <div class="button" onclick="trigger('radio2')">
        <img src="BBC_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('bfbs')">
        <img src="BFBS_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('ghr')">
        <img src="GHR_Premium.png">
    </div>

    <div class="button" onclick="trigger('absolute')">
        <img src="Absolute_Radio.png">
    </div>

    <div class="button" onclick="window.location.href='spotify://'">
        <img src="Spotify.jpg">
    </div>

</div>

<!-- FIXED FOOTER GRID -->
<div class="footer-grid">

    <div class="footer-button" onclick="window.location.href='https://www.bbc.co.uk/news'">
        <img src="BBC_News.jpg">
    </div>

    <div class="footer-button" onclick="window.location.href='https://www.bbc.co.uk/sport'">
        <img src="BBC_Sport.jpg">
    </div>

    <div class="footer-button" onclick="window.location.href='https://www.bbc.co.uk/weather/iv3'">
        <img src="BBC_Weather.png">
    </div>

</div>

<!-- WeatherWidget.io script -->
<script>
!function(d,s,id){
    var js,fjs=d.getElementsByTagName(s)[0];
    if(!d.getElementById(id)){
        js=d.createElement(s);js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
    }
}(document,'script','weatherwidget-io-js');
</script>

</body>
</html>
