<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mains Control Panel</title>

<style>
    body {
        margin: 0;
        background: #0A1A2F;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: white;
    }

    .header {
        padding: 30px;
        font-size: 32px;
        font-weight: 600;
        text-align: center;
        background: #102A45;
        border-bottom: 1px solid #1B3A5A;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .button {
        padding: 0;
        border-radius: 20px;
        overflow: hidden;
        background: #1B3A5A;
        height: 180px;
        position: relative;
        transition: 0.15s;
        user-select: none;
    }

    .button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }

    /* Weather tile */
    .weather {
        background: #102A45;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
        height: 180px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
    }

    .weather img {
        width: 70px;
        height: 70px;
        object-fit: contain;
        margin: 0 auto;
    }

    .temp {
        font-size: 32px;
        font-weight: 600;
    }

    .desc {
        font-size: 18px;
        opacity: 0.8;
    }
</style>
