<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Panel</title>

<style>
    body {
        margin: 0;
        background: #0A1A2F;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: white;
    }

    /* HEADER */
    .header {
        padding: 12px 30px;
        background: #102A45;
        border-bottom: 1px solid #1B3A5A;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 20px;
        min-height: 120px;
    }

    .header-title {
        font-size: 28px;
        font-weight: 600;
        white-space: nowrap;
    }

    /* Weather widget container */
    .weather-header-widget {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        max-width: 700px;
        overflow: visible;
    }

    .weather-wrapper {
        width: 100%;
        min-height: 110px;
        display: block;
    }

    /* MAIN GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .button {
        padding: 0;
        border-radius: 20px;
        overflow: hidden;
        background: #1B3A5A;
        height: 180px;
        position: relative;
        transition: 0.15s;
        user-select: none;
        cursor: pointer;
    }

    .button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }

    /* FOOTER GRID (half-height tiles) */
    .footer-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 0 30px 30px 30px;
    }

    .footer-button {
        padding: 0;
        border-radius: 20px;
        overflow: hidden;
        background: #1B3A5A;
        height: 90px; /* HALF HEIGHT */
        position: relative;
        transition: 0.15s;
        user-select: none;
        cursor: pointer;
    }

    .footer-button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .footer-button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }
</style>

<script>
/* Trigger IFTTT */
function trigger(webhook, value) {
    fetch("https://maker.ifttt.com/trigger/" + webhook + "/with/key/YOUR_IFTTT_KEY?value1=" + value);
}
</script>

</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-title">Control Panel</div>

    <div class="weather-header-widget">
        <div class="weather-wrapper">
            <a class="weatherwidget-io"
               href="https://forecast7.com/en/57d48n4d22/inverness/"
               data-label_1="INVERNESS"
               data-label_2="WEATHER"
               data-basecolor="#102A45"
               data-textcolor="#FFFFFF"
               data-highcolor="#FFCC00"
               data-lowcolor="#66A3FF"
               data-suncolor="#FFCC00"
               data-mooncolor="#A0C4FF">
               INVERNESS WEATHER
            </a>
        </div>
    </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

    <div class="button" onclick="trigger('radio_trigger', 10)">
        <img src="BBC_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 20)">
        <img src="BFBS_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 30)">
        <img src="GHR_Premium.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 40)">
        <img src="Absolute_Radio.png">
    </div>

    <!-- SPOTIFY BUTTON (now using Spotify.jpg) -->
    <div class="button" onclick="window.location.href='spotify://'">
        <img src="Spotify.jpg">
    </div>

</div>

<!-- FOOTER GRID (half-height tiles) -->
<div class="footer-grid">

    <div class="footer-button" onclick="window.location.href='https://www.bbc.co.uk/news'">
        <img src="BBC_News.jpg">
    </div>

    <!-- Add more footer tiles here if you want -->
</div>

<!-- WeatherWidget.io script -->
<script>
!function(d,s,id){
    var js,fjs=d.getElementsByTagName(s)[0];
    if(!d.getElementById(id)){
        js=d.createElement(s);js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
    }
}(document,'script','weatherwidget-io-js');
</script>

</body>
</html>
