<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mains Control Panel</title>

<style>
    body {
        margin: 0;
        background: #0A1A2F;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: white;
    }

    /* HEADER WITH WEATHER */
    .header {
        padding: 20px 30px;
        font-size: 28px;
        font-weight: 600;
        background: #102A45;
        border-bottom: 1px solid #1B3A5A;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header-title {
        font-size: 28px;
        font-weight: 600;
    }

    /* WEATHER TILE IN HEADER */
    .weather-header-tile {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #1B3A5A;
        padding: 10px 16px;
        border-radius: 12px;
        font-size: 14px;
    }

    .weather-header-icon {
        width: 32px;
        height: 32px;
    }

    .weather-header-temp {
        font-size: 20px;
        font-weight: 700;
    }

    .weather-header-desc {
        opacity: 0.8;
        font-size: 12px;
    }

    /* GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .button {
        padding: 0;
        border-radius: 20px;
        overflow: hidden;
        background: #1B3A5A;
        height: 180px;
        position: relative;
        transition: 0.15s;
        user-select: none;
    }

    .button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }
</style>

<script>
function trigger(webhook, value) {
    fetch("https://maker.ifttt.com/trigger/" + webhook + "/with/key/YOUR_IFTTT_KEY?value1=" + value);
}

async function loadBBCWeather() {
    const proxy = "https://corsproxy.io/?";
    const feed = "https://weather-broker-cdn.api.bbci.co.uk/en/observation/rss/2655009";

    try {
        const res = await fetch(proxy + encodeURIComponent(feed));
        const text = await res.text();

        const parser = new DOMParser();
        const xml = parser.parseFromString(text, "text/xml");

        const descHTML = xml.querySelector("item description").textContent;

        // Convert HTML string into a DOM node
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = descHTML;

        const strongs = tempDiv.querySelectorAll("strong");

        let temp = "";
        let weather = "";

        strongs.forEach(s => {
            const label = s.textContent.replace(":", "").trim();
            const value = s.nextSibling.textContent.trim();

            if (label === "Temperature") temp = value;
            if (label === "Weather") weather = value;
        });

        document.getElementById("bbc-header-temp").innerText = temp;
        document.getElementById("bbc-header-desc").innerText = weather;

const iconMap = {
    "Sunny": "https://openweathermap.org/img/wn/01d.png",
    "Clear": "https://openweathermap.org/img/wn/01d.png",
    "Cloudy": "https://openweathermap.org/img/wn/03d.png",
    "Partly cloudy": "https://openweathermap.org/img/wn/02d.png",
    "Light rain": "https://openweathermap.org/img/wn/10d.png",
    "Heavy rain": "https://openweathermap.org/img/wn/09d.png",
    "Light snow": "https://openweathermap.org/img/wn/13d.png",
    "Heavy snow": "https://openweathermap.org/img/wn/13d.png",
    "Fog": "https://openweathermap.org/img/wn/50d.png",
    "Mist": "https://openweathermap.org/img/wn/50d.png"
};


        document.getElementById("bbc-header-icon").src =
            iconMap[weather] || iconMap["Cloudy"];

    } catch (e) {
        console.error("BBC Weather Error:", e);
        document.getElementById("bbc-header-desc").innerText = "Weather unavailable";
    }
}

window.onload = loadBBCWeather;
</script>


</head>
<body>

<!-- HEADER WITH WEATHER -->
<div class="header">
    <div class="header-title">The Mains Control Panel</div>

    <div class="weather-header-tile">
        <img id="bbc-header-icon" class="weather-header-icon">
        <div>
            <div id="bbc-header-temp" class="weather-header-temp"></div>
            <div id="bbc-header-desc" class="weather-header-desc"></div>
        </div>
    </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

    <div class="button" onclick="trigger('radio_trigger', 10)">
        <img src="BBC_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 20)">
        <img src="BFBS_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 30)">
        <img src="GHR_Premium.png">
    </div>

</div>

</body>
</html>
