<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mains Control Panel</title>

<style>
    body {
        margin: 0;
        background: #0A1A2F;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: white;
    }

    .header {
        padding: 30px;
        font-size: 32px;
        font-weight: 600;
        text-align: center;
        background: #102A45;
        border-bottom: 1px solid #1B3A5A;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .button {
        padding: 0;
        border-radius: 20px;
        overflow: hidden;
        background: #1B3A5A;
        height: 180px;
        position: relative;
        transition: 0.15s;
        user-select: none;
    }

    .button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }

    /* BBC Weather tile wrapper */
    .bbc-weather {
        width: 100%;
        height: 180px;
        border-radius: 20px;
        overflow: hidden;
        background: #102A45;
        border: none;
    }
</style>

<script>
function trigger(webhook, value) {
    fetch("https://maker.ifttt.com/trigger/" + webhook + "/with/key/YOUR_IFTTT_KEY?value1=" + value);
}
</script>

</head>
<body>

<div class="header">The Mains Control Panel</div>

<div class="grid">

    <!-- BBC Weather Widget for Inverness -->
    <iframe 
        class="bbc-weather"
        src="https://weather-broker-cdn.api.bbci.co.uk/en/observation/rss/2655009">
    </iframe>

    <!-- Radio buttons -->
    <div class="button" onclick="trigger('radio_trigger', 10)">
        <img src="BBC_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 20)">
        <img src="BFBS_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 30)">
        <img src="GHR_Premium.png">
    </div>

</div>

</body>
</html>
