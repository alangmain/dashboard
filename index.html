<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Mains Control Panel</title>

<style>
    body {
        margin: 0;
        background: #0A1A2F;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        color: white;
    }

    /* HEADER WITH WIDE WEATHER WIDGET */
    .header {
        padding: 20px 30px;
        background: #102A45;
        border-bottom: 1px solid #1B3A5A;
        display: flex;
        justify-content: space-between;
        align-items: center;   /* FIX: stable vertical alignment */
        gap: 20px;
        min-height: 160px;
    }

    .header-title {
        font-size: 28px;
        font-weight: 600;
        white-space: nowrap;
    }

    /* Weather widget container */
    .weather-header-widget {
        flex: 1;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        max-width: 700px;
        overflow: visible;
    }

    /* Wrapper FIX — stabilises iframe height */
    .weather-wrapper {
        width: 100%;
        min-height: 150px;   /* FIX: prevents collapse */
        display: block;      /* FIX: removes flex behaviour */
    }

    /* GRID */
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 20px;
        padding: 30px;
    }

    .button {
        padding: 0;
        border-radius: 20px;
        overflow: hidden;
        background: #1B3A5A;
        height: 180px;
        position: relative;
        transition: 0.15s;
        user-select: none;
    }

    .button:active {
        transform: scale(0.95);
        filter: brightness(1.2);
    }

    .button img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }
</style>

<script>
/* Trigger IFTTT */
function trigger(webhook, value) {
    fetch("https://maker.ifttt.com/trigger/" + webhook + "/with/key/YOUR_IFTTT_KEY?value1=" + value);
}
</script>

</head>
<body>

<!-- HEADER WITH WEATHER WIDGET -->
<div class="header">
    <div class="header-title">The Mains Control Panel</div>

    <div class="weather-header-widget">
        <div class="weather-wrapper">
            <a class="weatherwidget-io"
               href="https://forecast7.com/en/57d48n4d22/inverness/"
               data-label_1="INVERNESS"
               data-label_2="WEATHER"
               data-basecolor="#1B3A5A"
               data-textcolor="#FFFFFF"
               data-highcolor="#FFCC00"
               data-lowcolor="#66A3FF"
               data-suncolor="#FFCC00"
               data-mooncolor="#A0C4FF">
               INVERNESS WEATHER
            </a>
        </div>
    </div>
</div>

<!-- MAIN GRID -->
<div class="grid">

    <div class="button" onclick="trigger('radio_trigger', 10)">
        <img src="BBC_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 20)">
        <img src="BFBS_Radio_2.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 30)">
        <img src="GHR_Premium.png">
    </div>

    <div class="button" onclick="trigger('radio_trigger', 40)">
        <img src="Absolute_Radio.png">
    </div>

</div>

<!-- WeatherWidget.io script -->
<script>
!function(d,s,id){
    var js,fjs=d.getElementsByTagName(s)[0];
    if(!d.getElementById(id)){
        js=d.createElement(s);js.id=id;
        js.src='https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
    }
}(document,'script','weatherwidget-io-js');
</script>

</body>
</html>
